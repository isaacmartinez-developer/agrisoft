<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>AGRISOFT - Zones</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; }
        h2 { text-align:center; margin:10px 0; }
        #map { height: 90vh; }
    </style>
</head>
<body>

<h2>Gestió de Zones Agrícoles</h2>
<div id="map"></div>

<script>
const map = L.map('map').setView([41.63, 0.89], 13); // Lleida aprox

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
    draw: {
        polygon: true,
        marker: false,
        polyline: false,
        rectangle: false,
        circle: false,
        circlemarker: false
    },
    edit: {
        featureGroup: drawnItems
    }
});
map.addControl(drawControl);

// Carregar zones existents
fetch("get_zones.php")
.then(res => res.json())
.then(data => {
    data.forEach(zone => {
        const polygon = L.polygon(zone.coords);
        polygon.zone_id = zone.id;
        drawnItems.addLayer(polygon);
    });
});

// Crear zona nova
map.on('draw:created', function (e) {
    const layer = e.layer;
    drawnItems.addLayer(layer);

    const coords = layer.getLatLngs()[0].map(p => ({
        lat: p.lat,
        lng: p.lng
    }));

    const name = prompt("Nom de la zona:");
    if(!name) return;

    fetch("save_zone.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, coords })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "ok") alert("Zona guardada correctament!");
    });
});

// Eliminar zones
map.on('draw:deleted', function (e) {
    e.layers.eachLayer(layer => {
        if(layer.zone_id) {
            fetch("delete_zone.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: layer.zone_id })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "ok") console.log("Zona eliminada!");
            });
        }
    });
});
</script>

</body>
</html>
